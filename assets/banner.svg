<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <radialGradient id="sky" cx="68%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#141826"/>
      <stop offset="55%" stop-color="#0a0d15"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <linearGradient id="disk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bfe0ff"/>
      <stop offset="22%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ffd27a"/>
      <stop offset="78%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#7a3b08"/>
    </linearGradient>
    <radialGradient id="diskGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd27a" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f5a623" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7e6" stop-opacity="0"/>
      <stop offset="72%" stop-color="#fff7e6" stop-opacity="0"/>
      <stop offset="86%" stop-color="#ffe9b8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffd27a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="1200" height="400" fill="url(#sky)"/>

  <!-- lensed star field -->
  <g fill="#cdd6ec">
    <circle cx="120" cy="60" r="1.6" opacity=".9"/><circle cx="260" cy="120" r="1" opacity=".6"/>
    <circle cx="200" cy="300" r="1.3" opacity=".7"/><circle cx="90" cy="220" r="1" opacity=".5"/>
    <circle cx="420" cy="70" r="1.2" opacity=".7"/><circle cx="520" cy="300" r="1" opacity=".5"/>
    <circle cx="640" cy="60" r="1.4" opacity=".8"/><circle cx="980" cy="70" r="1.1" opacity=".6"/>
    <circle cx="1120" cy="150" r="1.5" opacity=".8"/><circle cx="1080" cy="320" r="1.2" opacity=".7"/>
    <circle cx="700" cy="340" r="1" opacity=".5"/><circle cx="1150" cy="250" r="1" opacity=".5"/>
    <circle cx="360" cy="200" r="0.9" opacity=".45"/><circle cx="470" cy="350" r="1.1" opacity=".6"/>
  </g>

  <!-- black hole, centered right -->
  <g transform="translate(840 200)">
    <ellipse cx="0" cy="0" rx="300" ry="120" fill="url(#diskGlow)"/>
    <!-- back of the disk (above the shadow, lensed up) -->
    <path d="M -250 -8 A 250 70 0 0 1 250 -8" fill="none" stroke="url(#disk)" stroke-width="20" opacity="0.92" stroke-linecap="round"/>
    <!-- accretion disk seen at an angle -->
    <ellipse cx="0" cy="6" rx="250" ry="66" fill="none" stroke="url(#disk)" stroke-width="30" opacity="0.96"/>
    <!-- photon ring + shadow -->
    <circle cx="0" cy="0" r="92" fill="url(#ringGlow)"/>
    <circle cx="0" cy="0" r="66" fill="#05060a"/>
    <circle cx="0" cy="0" r="67" fill="none" stroke="#fff3d6" stroke-width="2.2" opacity="0.9"/>
    <!-- front of the disk over the shadow's lower edge -->
    <path d="M -250 14 A 250 66 0 0 0 250 14" fill="none" stroke="url(#disk)" stroke-width="30" opacity="0.98" stroke-linecap="round"/>
  </g>

  <!-- title -->
  <g transform="translate(70 150)">
    <text x="0" y="0" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">
      <tspan fill="#f5a623">◉</tspan> Black Hole</text>
    <text x="0" y="62" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">Explorer</text>
    <text x="2" y="104" font-size="19" fill="#9aa4b2">Relativistic, ray-traced &amp; scientifically accurate.</text>
    <g font-size="13" fill="#cdd6ec">
      <rect x="0" y="124" width="150" height="26" rx="13" fill="#161b24" stroke="#2a3340"/>
      <text x="14" y="141">WebGL2 · no deps</text>
      <rect x="160" y="124" width="120" height="26" rx="13" fill="#161b24" stroke="#2a3340"/>
      <text x="174" y="141">Grounded in EHT</text>
      <rect x="290" y="124" width="120" height="26" rx="13" fill="#161b24" stroke="#2a3340"/>
      <text x="304" y="141">GPU-adaptive</text>
    </g>
  </g>
</svg>
